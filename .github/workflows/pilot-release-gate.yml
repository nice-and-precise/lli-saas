name: pilot-release-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "services/**"
      - "infra/**"
      - "docs/**"
      - "scripts/pilot-readiness-check.sh"
      - ".github/workflows/pilot-release-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            services/crm-adapter/package-lock.json
            services/user-portal/package-lock.json
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
      - name: Install Poetry
        run: pipx install poetry==2.3.2
      - name: Install crm-adapter deps
        working-directory: services/crm-adapter
        run: npm ci
      - name: Install user-portal deps
        working-directory: services/user-portal
        run: npm ci
      - name: Install lead-engine deps
        working-directory: services/lead-engine
        run: poetry install
      - name: Install obituary-intelligence-engine deps
        working-directory: services/obituary-intelligence-engine
        run: poetry install
      - name: Run pilot release gate
        run: bash scripts/pilot-readiness-check.sh

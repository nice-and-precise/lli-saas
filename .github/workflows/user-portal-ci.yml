name: user-portal-ci
# CI touch: keep workflow-triggered checks attached to integration commits.

on:
  push:
    branches: [main]
    paths:
      - "services/user-portal/**"
      - ".github/workflows/user-portal-ci.yml"
  pull_request:
    paths:
      - "services/user-portal/**"
      - ".github/workflows/user-portal-ci.yml"

jobs:
  test-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/user-portal/package-lock.json
      - name: Install dependencies
        working-directory: services/user-portal
        run: npm ci
      - name: Run tests
        working-directory: services/user-portal
        run: npm test
      - name: Build portal
        working-directory: services/user-portal
        run: npm run build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nice-and-precise/lli-saas-user-portal
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/user-portal
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

{{- range $name, $schedule := .Values.schedules }}
{{- if $schedule.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $schedule.name }}
spec:
  schedule: {{ $schedule.schedule | quote }}
  timeZone: {{ $schedule.timeZone | default "America/Chicago" | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: {{ $schedule.name }}
              image: curlimages/curl:8.12.1
{{- if or $schedule.authTokenValue $schedule.authTokenSecret }}
              env:
                - name: {{ default "LEAD_ENGINE_CRON_JWT" $schedule.authTokenEnv }}
{{- if $schedule.authTokenSecret }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ $schedule.authTokenSecret.secretName | quote }}
                      key: {{ $schedule.authTokenSecret.secretKey | quote }}
{{- if hasKey $schedule.authTokenSecret "optional" }}
                      optional: {{ $schedule.authTokenSecret.optional }}
{{- end }}
{{- else }}
                  value: {{ $schedule.authTokenValue | quote }}
{{- end }}
{{- end }}
              args:
                - /bin/sh
                - -c
                - >
                  curl --fail --silent --show-error
                  -H "Content-Type: application/json"
{{- if $schedule.authTokenEnv }}
                  -H "Authorization: Bearer ${{ $schedule.authTokenEnv }}"
{{- else if $schedule.authTokenSecret }}
                  -H "Authorization: Bearer $LEAD_ENGINE_CRON_JWT"
{{- end }}
                  -d '{{ $schedule.requestBody }}'
                  {{ $schedule.endpoint }}
---
{{- end }}
{{- end }}

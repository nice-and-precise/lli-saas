{{- range $key, $svc := .Values.services }}
{{- if $.Values.validatePlaceholders }}
{{- include "lli-saas.validateEnv" $svc.env }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
{{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
{{- range . }}
        - name: {{ . | quote }}
{{- end }}
{{- end }}
      serviceAccountName: {{ $svc.name }}
      containers:
        - name: {{ $svc.name }}
          image: {{ include "lli-saas.imageRef" $svc.image | quote }}
{{- if $svc.image.pullPolicy }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
{{- end }}
          ports:
            - containerPort: {{ $svc.port }}
{{- if or $svc.env $svc.secretEnv }}
          env:
{{- range $envKey, $envValue := $svc.env }}
            - name: {{ $envKey }}
              value: {{ $envValue | quote }}
{{- end }}
{{- range $envKey, $secretRef := $svc.secretEnv }}
            - name: {{ $envKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretRef.secretName | quote }}
                  key: {{ $secretRef.secretKey | quote }}
{{- if hasKey $secretRef "optional" }}
                  optional: {{ $secretRef.optional }}
{{- end }}
{{- end }}
{{- end }}
{{- if or (and $svc.persistence $svc.persistence.enabled) (eq $svc.name "obituary-intelligence-engine") }}
          volumeMounts:
{{- if and $svc.persistence $svc.persistence.enabled }}
            - name: {{ $svc.persistence.claimName }}
              mountPath: {{ $svc.persistence.mountPath | quote }}
{{- end }}
{{- if eq $svc.name "obituary-intelligence-engine" }}
            - name: {{ printf "%s-proof-source" $svc.name }}
              mountPath: /app/fixtures
{{- end }}
{{- end }}
          resources:
{{ toYaml $svc.resources | indent 12 }}
{{- if $svc.probes.enabled }}
          readinessProbe:
            httpGet:
              path: {{ $svc.probes.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: {{ $svc.probes.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 5
{{- end }}
{{- if or (and $svc.persistence $svc.persistence.enabled) (eq $svc.name "obituary-intelligence-engine") }}
      volumes:
{{- if and $svc.persistence $svc.persistence.enabled }}
        - name: {{ $svc.persistence.claimName }}
          persistentVolumeClaim:
            claimName: {{ $svc.persistence.claimName }}
{{- end }}
{{- if eq $svc.name "obituary-intelligence-engine" }}
        - name: {{ printf "%s-proof-source" $svc.name }}
          configMap:
            name: {{ printf "%s-proof-source" $svc.name }}
{{- end }}
{{- end }}
---
{{- end }}

services:
  leadEngine:
    image:
      reference: ghcr.io/nice-and-precise/lli-saas-lead-engine@sha256:replace-with-lead-engine-digest

  obituaryIntelligenceEngine:
    image:
      reference: ghcr.io/nice-and-precise/lli-saas-obituary-intelligence-engine@sha256:replace-with-obituary-engine-digest

  crmAdapter:
    image:
      reference: ghcr.io/nice-and-precise/lli-saas-crm-adapter@sha256:replace-with-crm-adapter-digest
    env:
      MONDAY_REDIRECT_URI: https://crm-adapter.example.com/auth/callback
      AUTH_ALLOWED_ORIGINS: https://portal.example.com
      OPERATOR_TENANT_ID: pilot
      OPERATOR_PORTAL_BASE_URL: https://portal.example.com

  userPortal:
    image:
      reference: ghcr.io/nice-and-precise/lli-saas-user-portal@sha256:replace-with-user-portal-digest
    env:
      CRM_ADAPTER_BASE_URL: https://crm-adapter.example.com
      LEAD_ENGINE_BASE_URL: https://lead-engine.example.com

schedules:
  dailyLeadScan:
    schedule: "0 12 * * *"
    timeZone: "America/Chicago"

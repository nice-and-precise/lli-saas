services:
  leadEngine:
    name: lead-engine
    image:
      repository: ghcr.io/nice-and-precise/lli-saas-lead-engine
      tag: latest
    port: 8000
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
    probes:
      enabled: true
      path: /ready
    env:
      CRM_ADAPTER_BASE_URL: http://crm-adapter:3000
      OBITUARY_ENGINE_BASE_URL: http://reaper:8080
  crmAdapter:
    name: crm-adapter
    image:
      repository: ghcr.io/nice-and-precise/lli-saas-crm-adapter
      tag: latest
    port: 3000
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    probes:
      enabled: true
      path: /ready
    env:
      MONDAY_CLIENT_ID: change-me
      MONDAY_CLIENT_SECRET: change-me
      MONDAY_REDIRECT_URI: http://crm-adapter:3000/auth/callback
  userPortal:
    name: user-portal
    image:
      repository: ghcr.io/nice-and-precise/lli-saas-user-portal
      tag: latest
    port: 80
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
    probes:
      enabled: false
      path: /

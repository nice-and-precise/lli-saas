apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lead-engine
  template:
    metadata:
      labels:
        app: lead-engine
    spec:
      containers:
        - name: lead-engine
          image: ghcr.io/nice-and-precise/lli-saas-lead-engine:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: CRM_ADAPTER_BASE_URL
              value: "http://crm-adapter:3000"
            - name: OBITUARY_ENGINE_BASE_URL
              value: "http://obituary-intelligence-engine:8080"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lli-saas-shared-auth
                  key: AUTH_JWT_SECRET
            - name: AUTH_JWT_ISSUER
              value: "lli-saas-pilot"
            - name: AUTH_JWT_AUDIENCE
              value: "lli-saas"
            - name: AUTH_ALLOWED_ORIGINS
              value: "https://portal.example.com"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /ready
              port: 8000

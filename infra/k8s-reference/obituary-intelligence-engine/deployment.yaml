apiVersion: apps/v1
kind: Deployment
metadata:
  name: obituary-intelligence-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obituary-intelligence-engine
  template:
    metadata:
      labels:
        app: obituary-intelligence-engine
    spec:
      containers:
        - name: obituary-intelligence-engine
          image: ghcr.io/nice-and-precise/lli-saas-obituary-intelligence-engine:latest
          ports:
            - containerPort: 8080
          env:
            - name: OBITUARY_ENGINE_STATE_PATH
              value: "/var/lib/lli-saas/obituary-intelligence-engine/state.json"
            - name: OBITUARY_ENGINE_RETENTION_DAYS
              value: "30"
            - name: OBITUARY_HTTP_TIMEOUT_SECONDS
              value: "10"
            - name: HEIR_EXTRACTION_PRIMARY_PROVIDER
              value: "gemini"
            - name: HEIR_EXTRACTION_PRIMARY_MODEL
              value: "gemini-2.5-flash"
            - name: HEIR_EXTRACTION_FALLBACK_PROVIDER
              value: "gemini"
            - name: HEIR_EXTRACTION_FALLBACK_MODEL
              value: "gemini-1.5-flash"
            - name: HEIR_EXTRACTION_FINAL_PROVIDER
              value: "anthropic"
            - name: HEIR_EXTRACTION_FINAL_MODEL
              value: "claude-3-7-sonnet-latest"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lli-saas-shared-auth
                  key: AUTH_JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lli-saas-obituary-provider-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lli-saas-obituary-provider-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lli-saas-obituary-provider-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: AUTH_JWT_ISSUER
              value: "lli-saas-pilot"
            - name: AUTH_JWT_AUDIENCE
              value: "lli-saas"
            - name: AUTH_ALLOWED_ORIGINS
              value: "https://portal.example.com"
          volumeMounts:
            - name: obituary-engine-state
              mountPath: "/var/lib/lli-saas/obituary-intelligence-engine"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /ready
              port: 8080
      volumes:
        - name: obituary-engine-state
          persistentVolumeClaim:
            claimName: obituary-engine-state

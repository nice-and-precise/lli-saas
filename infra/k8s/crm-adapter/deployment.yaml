apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crm-adapter
  template:
    metadata:
      labels:
        app: crm-adapter
    spec:
      containers:
        - name: crm-adapter
          image: ghcr.io/nice-and-precise/lli-saas-crm-adapter:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: MONDAY_CLIENT_ID
              value: "change-me"
            - name: MONDAY_CLIENT_SECRET
              value: "change-me"
            - name: MONDAY_REDIRECT_URI
              value: "http://crm-adapter:3000/auth/callback"
            - name: CRM_ADAPTER_STATE_PATH
              value: "/var/lib/lli-saas/crm-adapter/monday-state.json"
          volumeMounts:
            - name: crm-adapter-state
              mountPath: "/var/lib/lli-saas/crm-adapter"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
      volumes:
        - name: crm-adapter-state
          persistentVolumeClaim:
            claimName: crm-adapter-state
          livenessProbe:
            httpGet:
              path: /ready
              port: 3000

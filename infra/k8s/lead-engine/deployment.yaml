apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lead-engine
  template:
    metadata:
      labels:
        app: lead-engine
    spec:
      containers:
        - name: lead-engine
          image: ghcr.io/nice-and-precise/lli-saas-lead-engine:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: REAPER_BASE_URL
              value: "http://reaper:8080"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
          livenessProbe:
            httpGet:
              path: /ready
              port: 8000

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLI Data Intake API</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0b1020; color: #e5e7eb; }
      header { padding: 20px 24px; border-bottom: 1px solid #1f2937; background: #111827; }
      header h1 { margin: 0 0 8px; font-size: 24px; }
      header p { margin: 0; color: #9ca3af; max-width: 900px; }
      .meta { padding: 12px 24px; background: #0f172a; border-bottom: 1px solid #1f2937; color: #cbd5e1; }
      .meta code { background: #111827; padding: 2px 6px; border-radius: 4px; }
      #swagger-ui { max-width: 1600px; margin: 0 auto; }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  </head>
  <body>
    <header>
      <h1>LLI Data Intake API</h1>
      <p>Interactive reference for broker or IT-team self-service integration with lli-saas crm-adapter. Use the OpenAPI spec below to inspect routes, required fields, validation rules, and lead submission examples.</p>
    </header>
    <div class="meta">
      OpenAPI source: <code>services/crm-adapter/openapi.json</code>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: './openapi.json',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        defaultModelsExpandDepth: 2,
        defaultModelExpandDepth: 2,
        docExpansion: 'list'
      });
    </script>
  </body>
</html>
